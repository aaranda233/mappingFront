<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <title>Hortichuelas - Direcciones</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <script src="/env.js"></script>
</head>

<body :class="{'dark bg-gray-900': darkMode === true}"
  x-data="{ page: 'direcciones', loaded: true, darkMode: false, stickyMenu: false, sidebarToggle: false, scrollTop: false }"
  x-init="
    darkMode = JSON.parse(localStorage.getItem('darkMode'));
    $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))
  " x-cloak>

  <div class="flex h-screen overflow-hidden">
    <include src="./partials/sidebar.html"></include>

    <div class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto">
      <include src="./partials/overlay.html" />
      <include src="./partials/header.html" />

      <main x-data="direccionesManager()" x-init="init" x-cloak>
        <div class="p-6">
          <!-- Titulo y filtros -->
          <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-800 mb-4">Direcciones Mapeadas</h1>

            <div class="flex flex-col sm:flex-row gap-3">
              <!-- Buscador -->
              <div class="relative flex-1">
                <svg xmlns="http://www.w3.org/2000/svg"
                  class="absolute left-3 top-1/2 -translate-y-1/2 h-5 w-5 text-gray-400" fill="none"
                  viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z" />
                </svg>
                <input type="text" placeholder="Buscar por direcci&oacute;n, ID cliente, ID direcci&oacute;n..."
                  class="w-full pl-10 pr-4 py-2.5 bg-white/80 border border-gray-300 rounded-xl shadow-sm focus:border-[color:#f97316] focus:ring-1 focus:ring-[color:#f97316] transition"
                  x-model="busqueda" @input="buscar()" />
              </div>

              <!-- Filtro cliente -->
              <select
                class="px-4 py-2.5 bg-white/80 border border-gray-300 rounded-xl shadow-sm focus:border-[color:#f97316] focus:ring-1 focus:ring-[color:#f97316] transition min-w-[220px]"
                x-model="filtroCliente" @change="cambiarFiltro()">
                <template x-for="c in clientes" :key="c.id">
                  <option :value="c.id" x-text="c.nombre"></option>
                </template>
              </select>
            </div>
          </div>

          <!-- Loading -->
          <div x-show="loading" class="text-center p-4 text-gray-600">
            <svg class="animate-spin h-6 w-6 mx-auto text-[color:#f97316]" xmlns="http://www.w3.org/2000/svg" fill="none"
              viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z" />
            </svg>
            <p class="mt-2">Cargando...</p>
          </div>

          <!-- Tabla -->
          <div x-show="!loading && direcciones.length > 0"
            class="bg-white/60 backdrop-blur-xl shadow-xl rounded-2xl border border-gray-200 overflow-hidden">
            <div class="overflow-x-auto">
              <table class="w-full text-sm text-left">
                <thead class="bg-gradient-to-r from-[#00394a] to-[#00394a]/80 text-white">
                  <tr>
                    <th class="px-4 py-3 font-semibold cursor-pointer select-none hover:bg-white/10 transition" @click="sortBy('Id')">
                      <span class="flex items-center gap-1">Id
                        <svg x-show="sortField === 'Id'" class="w-3 h-3" :class="sortDirection === 'desc' && 'rotate-180'" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20"><path d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"/></svg>
                      </span>
                    </th>
                    <th class="px-4 py-3 font-semibold cursor-pointer select-none hover:bg-white/10 transition" @click="sortBy('IdCliente')">
                      <span class="flex items-center gap-1">Cliente
                        <svg x-show="sortField === 'IdCliente'" class="w-3 h-3" :class="sortDirection === 'desc' && 'rotate-180'" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20"><path d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"/></svg>
                      </span>
                    </th>
                    <th class="px-4 py-3 font-semibold cursor-pointer select-none hover:bg-white/10 transition" @click="sortBy('Direccion')">
                      <span class="flex items-center gap-1">Direcci&oacute;n origen
                        <svg x-show="sortField === 'Direccion'" class="w-3 h-3" :class="sortDirection === 'desc' && 'rotate-180'" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20"><path d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"/></svg>
                      </span>
                    </th>
                    <th class="px-4 py-3 font-semibold cursor-pointer select-none hover:bg-white/10 transition" @click="sortBy('IdDireccion')">
                      <span class="flex items-center gap-1">Id Direcci&oacute;n
                        <svg x-show="sortField === 'IdDireccion'" class="w-3 h-3" :class="sortDirection === 'desc' && 'rotate-180'" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20"><path d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"/></svg>
                      </span>
                    </th>
                    <th class="px-4 py-3 font-semibold cursor-pointer select-none hover:bg-white/10 transition" @click="sortBy('FechaLog')">
                      <span class="flex items-center gap-1">Fecha
                        <svg x-show="sortField === 'FechaLog'" class="w-3 h-3" :class="sortDirection === 'desc' && 'rotate-180'" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20"><path d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"/></svg>
                      </span>
                    </th>
                    <th class="px-4 py-3 font-semibold text-center">Estado</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="(item, idx) in direcciones" :key="item.Id">
                    <tr class="border-b border-gray-100 hover:bg-[color:#f97316]/5 transition-colors"
                      :class="idx % 2 === 0 ? 'bg-white/40' : 'bg-gray-50/40'">
                      <td class="px-4 py-3 font-mono text-gray-500" x-text="item.Id"></td>
                      <td class="px-4 py-3 font-mono text-gray-600" x-text="item.IdCliente"></td>
                      <td class="px-4 py-3 text-gray-800" x-text="item.Direccion"></td>
                      <td class="px-4 py-3 font-mono text-gray-600" x-text="item.IdDireccion || '-'"></td>
                      <td class="px-4 py-3 text-gray-600 text-xs">
                        <span x-text="formatFecha(item.FechaLog)"></span>
                        <span x-show="item.HoraLog" class="text-gray-400 ml-1" x-text="item.HoraLog"></span>
                      </td>
                      <td class="px-4 py-3 text-center">
                        <span x-show="item.IdDireccion > 0"
                          class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
                          Mapeada
                        </span>
                        <span x-show="!item.IdDireccion || item.IdDireccion === 0"
                          class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800">
                          Pendiente
                        </span>
                      </td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
            <!-- Contador -->
            <div class="px-4 py-3 bg-gray-50/60 border-t border-gray-200 text-sm text-gray-500">
              <span x-text="direcciones.length"></span> resultados
            </div>
          </div>

          <!-- Sin resultados -->
          <template x-if="!loading && direcciones.length === 0">
            <div class="flex flex-col items-center justify-center text-center text-gray-600 mt-10">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-gray-400 mb-4" fill="none"
                viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M12 9v3m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
              <h2 class="text-xl font-semibold">No se encontraron direcciones</h2>
              <p class="text-gray-500 mt-2">Intenta con otra b&uacute;squeda o cambia los filtros.</p>
            </div>
          </template>
        </div>
      </main>
    </div>
  </div>
</body>

</html>
