<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Hortichuelas - Admin</title>

  <!-- Animaciones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

  <!-- Toastify -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

  <!-- Variables de entorno (inyectadas por ConfigMap en K8s) -->
  <script src="/env.js"></script>
</head>

<body :class="{'dark bg-gray-900': darkMode === true}"
  x-data="{ loaded: true, darkMode: false, stickyMenu: false, sidebarToggle: false, scrollTop: false }" x-init="
    darkMode = JSON.parse(localStorage.getItem('darkMode'));
    $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))
  " x-cloak>

  <div class="flex h-screen overflow-hidden">
    <include src="./partials/sidebar.html"></include>

    <div class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto">
      <include src="./partials/overlay.html" />
      <include src="./partials/header.html" />

      <main x-data="adminManager()" x-init="init" x-cloak>
        <!-- Toast -->
        <div x-show="toast" x-transition
          class="fixed top-5 right-5 bg-green-600 text-white px-4 py-2 rounded-xl shadow-lg z-50">
          <span x-text="toast"></span>
        </div>

        <div class="p-6 max-w-4xl mx-auto">
          <!-- Titulo -->
          <div class="mb-8">
            <h1 class="text-2xl font-bold text-gray-800">Gestión de Usuarios</h1>
            <p class="text-sm text-gray-500 mt-1">Añade o elimina usuarios de las listas de Admin y Desarrollador</p>
          </div>

          <!-- Mensajes -->
          <div x-show="successMessage" x-transition
            class="mb-4 px-4 py-3 rounded-xl bg-green-50 border border-green-200 text-green-800 text-sm font-medium flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
            <span x-text="successMessage"></span>
          </div>
          <div x-show="errorMessage" x-transition
            class="mb-4 px-4 py-3 rounded-xl bg-red-50 border border-red-200 text-red-800 text-sm font-medium flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M12 2a10 10 0 1010 10A10 10 0 0012 2z" />
            </svg>
            <span x-text="errorMessage"></span>
          </div>

          <!-- Formulario de añadir usuario -->
          <div class="bg-white rounded-2xl border border-gray-200 p-6 shadow-sm mb-8">
            <h2 class="text-lg font-semibold text-gray-700 mb-4">Añadir usuario</h2>
            <div class="flex flex-col sm:flex-row gap-4 items-start sm:items-end">
              <!-- Input email -->
              <div class="flex-1 w-full">
                <label class="block text-sm font-medium text-gray-600 mb-1">Correo electrónico</label>
                <input type="email" placeholder="usuario@ejemplo.com"
                  class="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-xl shadow-sm focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition text-sm"
                  x-model="email"
                  @keydown.enter="addUser()" />
              </div>

              <!-- Selección de rol -->
              <div class="flex gap-4">
                <label class="flex items-center gap-2 cursor-pointer px-4 py-2.5 rounded-xl border transition text-sm font-medium"
                  :class="role === 'admin' ? 'border-[#003a4b] bg-[#003a4b]/10 text-[#003a4b]' : 'border-gray-300 text-gray-500 hover:border-gray-400'">
                  <input type="radio" name="role" value="admin" x-model="role" class="hidden" />
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 2l7 4v5c0 5.25-3.5 9.74-7 11-3.5-1.26-7-5.75-7-11V6l7-4z" />
                  </svg>
                  Admin
                </label>
                <label class="flex items-center gap-2 cursor-pointer px-4 py-2.5 rounded-xl border transition text-sm font-medium"
                  :class="role === 'developer' ? 'border-purple-500 bg-purple-50 text-purple-700' : 'border-gray-300 text-gray-500 hover:border-gray-400'">
                  <input type="radio" name="role" value="developer" x-model="role" class="hidden" />
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
                  </svg>
                  Desarrollador
                </label>
              </div>

              <!-- Botón añadir -->
              <button @click="addUser()"
                class="px-6 py-2.5 bg-purple-600 hover:bg-purple-700 text-white font-semibold rounded-xl transition-colors text-sm flex items-center gap-2 whitespace-nowrap">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                </svg>
                Añadir
              </button>
            </div>
          </div>

          <!-- Listas de usuarios -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <!-- Desarrolladores -->
            <div class="bg-white rounded-2xl border border-gray-200 p-6 shadow-sm">
              <div class="flex items-center gap-2 mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-purple-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
                </svg>
                <h3 class="text-lg font-semibold text-gray-700">Desarrolladores</h3>
                <span class="text-xs font-bold rounded-full bg-purple-100 text-purple-700 px-2 py-0.5" x-text="developerUsers.length"></span>
              </div>
              <div class="space-y-2">
                <template x-for="(user, index) in developerUsers" :key="'dev-'+index">
                  <div class="flex items-center justify-between px-4 py-2.5 bg-purple-50/50 rounded-xl border border-purple-100">
                    <div class="flex items-center gap-2">
                      <div class="w-8 h-8 rounded-full bg-purple-200 flex items-center justify-center text-purple-700 font-bold text-xs uppercase" x-text="user.charAt(0)"></div>
                      <span class="text-sm text-gray-700" x-text="user"></span>
                    </div>
                    <button @click="removeUser(user, 'developer')"
                      class="text-gray-400 hover:text-red-500 transition p-1 rounded-lg hover:bg-red-50">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                      </svg>
                    </button>
                  </div>
                </template>
                <div x-show="developerUsers.length === 0" class="text-sm text-gray-400 text-center py-4">
                  No hay desarrolladores configurados
                </div>
              </div>
            </div>

            <!-- Admins -->
            <div class="bg-white rounded-2xl border border-gray-200 p-6 shadow-sm">
              <div class="flex items-center gap-2 mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-[#003a4b]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 2l7 4v5c0 5.25-3.5 9.74-7 11-3.5-1.26-7-5.75-7-11V6l7-4z" />
                </svg>
                <h3 class="text-lg font-semibold text-gray-700">Admins</h3>
                <span class="text-xs font-bold rounded-full bg-[#003a4b]/10 text-[#003a4b] px-2 py-0.5" x-text="adminUsers.length"></span>
              </div>
              <div class="space-y-2">
                <template x-for="(user, index) in adminUsers" :key="'admin-'+index">
                  <div class="flex items-center justify-between px-4 py-2.5 bg-[#003a4b]/5 rounded-xl border border-[#003a4b]/10">
                    <div class="flex items-center gap-2">
                      <div class="w-8 h-8 rounded-full bg-[#003a4b]/20 flex items-center justify-center text-[#003a4b] font-bold text-xs uppercase" x-text="user.charAt(0)"></div>
                      <span class="text-sm text-gray-700" x-text="user"></span>
                    </div>
                    <button @click="removeUser(user, 'admin')"
                      class="text-gray-400 hover:text-red-500 transition p-1 rounded-lg hover:bg-red-50">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                      </svg>
                    </button>
                  </div>
                </template>
                <div x-show="adminUsers.length === 0" class="text-sm text-gray-400 text-center py-4">
                  No hay admins configurados
                </div>
              </div>
            </div>
          </div>

          <!-- Loading -->
          <div x-show="loading" class="text-center py-8">
            <svg class="animate-spin h-6 w-6 mx-auto text-purple-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z" />
            </svg>
            <p class="mt-2 text-sm text-gray-500">Cargando roles...</p>
          </div>
        </div>
      </main>
    </div>
  </div>

  <include src="./partials/chat-widget.html"></include>
</body>

</html>
