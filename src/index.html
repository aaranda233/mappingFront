<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <title>Hortichuelas - Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
  <!-- Toastify CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

  <!-- Toastify JS -->
  <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <!-- Variables de entorno (inyectadas por ConfigMap en K8s) -->
  <script src="/env.js"></script>

</head>

<body :class="{'dark bg-gray-900': darkMode === true}"
  x-data="{ page: 'ecommerce', loaded: true, darkMode: false, stickyMenu: false, sidebarToggle: false, scrollTop: false }"
  x-init="
    darkMode = JSON.parse(localStorage.getItem('darkMode'));
    $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))
  " x-cloak>

  <div class="flex h-screen overflow-hidden">
    <include src="./partials/sidebar.html"></include>

    <div class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto">
      <include src="./partials/overlay.html" />
      <include src="./partials/header.html" />

      <main x-data="mappingManager()" x-init="init" x-cloak>
        <!-- Toast -->
        <div x-show="toast" x-transition
          class="fixed top-5 right-5 bg-green-600 text-white px-4 py-2 rounded-xl shadow-lg z-50">
          <span x-text="toast"></span>
        </div>

        <!--  Loading -->
        <div x-show="loading" class="text-center p-4 text-gray-600">
          <svg class="animate-spin h-6 w-6 mx-auto text-[#f17533]" xmlns="http://www.w3.org/2000/svg" fill="none"
            viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z" />
          </svg>
          <p class="mt-2">Cargando...</p>
        </div>

        <!--  Cards o mensaje vacío -->
        <div class="p-6">
          <template x-if="mappings.length === 0 && !loading">
            <div class="flex flex-col items-center justify-center text-center text-gray-600 mt-10">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-gray-400 mb-4" fill="none"
                viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M12 9v3m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                <h2 class="text-xl font-semibold">No hay mappings pendientes</h2>
                <p class="text-gray-500 mt-2">Todo está procesado. ¡Buen trabajo! </p>
            </div>
          </template>

          <div x-show="mappings.length > 0" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
            <template x-for="(item, index) in mappings" :key="item.id">
              <div x-show="!item.enviado" x-transition.duration.300ms
                :class="item.mostrarResultados ? 'relative z-50' : 'relative z-0'">
                <div
                  class="relative bg-white/60 backdrop-blur-xl shadow-xl rounded-3xl p-6 transition-all duration-300 transform hover:scale-[1.02] hover:shadow-2xl border border-gray-200 hover:border-[#f17533]/60 w-full">
                  <!-- Botones de acción (PDF + Histórico) -->
                  <div class="absolute top-3 right-3 flex items-center gap-2">
                    <button x-show="item.pdf"
                      class="flex items-center gap-1.5 px-3 py-1.5 rounded-full border border-red-400/60 bg-white/70 text-red-600 font-semibold text-xs shadow-md hover:shadow-lg hover:scale-105 backdrop-blur-md transition-all duration-300"
                      @click="abrirPdf(item)" title="Ver PDF">
                      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                          d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
                      </svg>
                      PDF
                    </button>

                    <button
                      class="flex items-center gap-1.5 px-3 py-1.5 rounded-full border border-blue-400/60 bg-white/70 text-blue-600 font-semibold text-xs shadow-md hover:shadow-lg hover:scale-105 backdrop-blur-md transition-all duration-300"
                      @click="consultarHistorico(item)"
                      title="&iquest;Ya se mape&oacute; antes esta referencia?">
                      <svg x-show="!item.buscandoHistorico" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                          d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                      </svg>
                      <svg x-show="item.buscandoHistorico" class="animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg"
                        fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z" />
                      </svg>
                      Hist&oacute;rico
                    </button>
                  </div>

                  <!-- Cabecera -->
                  <div class="flex items-center gap-3 mb-3">
                    <div class="rounded-full p-1 shadow-inner bg-white/80 w-10 h-10 flex items-center justify-center overflow-hidden">
                      <img x-show="[2194, 2202, 4319].includes(item.idcliente)"
                        src="/iberiana.png" alt="Iberiana" class="w-8 h-8 object-contain" />
                      <img x-show="item.idcliente === 1172"
                        src="/eurogroup.png" alt="Eurogroup" class="w-8 h-8 object-contain" />
                      <img x-show="![2194, 2202, 4319, 1172].includes(item.idcliente)"
                        src="/edeka.png" alt="EDEKA" class="w-8 h-8 object-contain rounded" />
                    </div>
                    <div>
                      <h2 class="text-lg font-bold text-gray-800">L&iacute;nea: <span x-text="item.id_linea"></span></h2>
                    </div>
                  </div>

                  <!-- Contenido info (siempre visible) -->
                  <div class="text-[15px] text-gray-700 space-y-1 mb-4">
                    <p class="flex items-center gap-2">
                      <span class="font-medium">Descripci&oacute;n:</span> <span x-text="item.descripcion"></span>
                      <button type="button" title="Buscar esta descripci&oacute;n"
                        class="shrink-0 p-1 rounded-lg text-[#f17533] hover:bg-[#f17533]/10 transition"
                        @click="item.busquedaPresentacion = item.descripcion; buscarPresentaciones(item)">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                          stroke="currentColor" stroke-width="2">
                          <path stroke-linecap="round" stroke-linejoin="round"
                            d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z" />
                        </svg>
                      </button>
                    </p>
                    <p><span class="font-medium">Ref. Pedido:</span> <span x-text="item.ref_pedido"></span></p>
                  </div>

                  <!-- ===== PANEL HISTÓRICO ===== -->
                  <div x-show="item.mostrarHistorico"
                    x-transition
                    class="mb-4 p-3 rounded-xl border border-blue-200 bg-blue-50/60">
                    <div class="flex items-center justify-between mb-2">
                      <span class="text-xs font-semibold text-blue-800 uppercase tracking-wide">
                        Hist&oacute;rico de esta referencia
                      </span>
                      <button type="button" class="text-gray-400 hover:text-red-500"
                        @click="item.mostrarHistorico = false">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                          stroke="currentColor" stroke-width="2">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                      </button>
                    </div>

                    <!-- Buscando -->
                    <div x-show="item.buscandoHistorico" class="text-sm text-gray-500 flex items-center gap-2">
                      <svg class="animate-spin h-4 w-4 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none"
                        viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z" />
                      </svg>
                      Buscando hist&oacute;rico...
                    </div>

                    <!-- Error -->
                    <div x-show="!item.buscandoHistorico && item.historico && item.historico.error"
                      class="text-sm text-red-600">
                      Error consultando el hist&oacute;rico.
                    </div>

                    <!-- Pedido actual -->
                    <div x-show="!item.buscandoHistorico && item.historico && item.historico.pedidoActual"
                      class="mb-3">
                      <div class="text-[11px] font-bold text-blue-700 uppercase mb-1">Del pedido actual</div>
                      <button type="button"
                        class="w-full text-left px-3 py-2 rounded-lg bg-white border border-blue-300 hover:bg-blue-100 transition"
                        @click="aplicarHistorico(item, item.historico.pedidoActual)">
                        <div class="flex items-center justify-between">
                          <div class="flex-1 min-w-0">
                            <div class="text-sm font-semibold text-gray-800" x-text="item.historico.pedidoActual.Presentacion"></div>
                            <div class="text-xs text-gray-500">
                              G&eacute;nero: <span class="font-medium" x-text="item.historico.pedidoActual.NomGenero"></span>
                              &middot; Cat: <span class="font-medium" x-text="item.historico.pedidoActual.NombreCategoria"></span>
                            </div>
                            <div x-show="[2194, 2202, 4319].includes(item.idcliente) && item.historico.pedidoActual.PED_referencia"
                              class="text-[11px] text-blue-600 mt-0.5">
                              Pedido: <span class="font-medium" x-text="item.historico.pedidoActual.PED_referencia"></span>
                              <span x-show="item.historico.pedidoActual.PED_fechasalida">
                                &middot; Fecha: <span class="font-medium" x-text="item.historico.pedidoActual.PED_fechasalida ? new Date(item.historico.pedidoActual.PED_fechasalida).toLocaleDateString('es-ES') : ''"></span>
                              </span>
                            </div>
                          </div>
                          <span class="text-[10px] font-bold uppercase bg-blue-600 text-white px-2 py-0.5 rounded-full ml-2">Aplicar</span>
                        </div>
                      </button>
                    </div>

                    <!-- Candidatos previos -->
                    <div x-show="!item.buscandoHistorico && item.historico && item.historico.candidatos && item.historico.candidatos.length > 0">
                      <div class="text-[11px] font-bold text-blue-700 uppercase mb-1">Mapeados previos del cliente</div>
                      <div class="space-y-1.5">
                        <template x-for="(cand, ci) in item.historico.candidatos" :key="ci">
                          <button type="button"
                            class="w-full text-left px-3 py-2 rounded-lg bg-white border border-gray-200 hover:bg-blue-50 hover:border-blue-300 transition"
                            @click="aplicarHistorico(item, cand)">
                            <div class="flex items-center justify-between gap-2">
                              <div class="flex-1 min-w-0">
                                <div class="text-sm font-semibold text-gray-800" x-text="cand.Presentacion"></div>
                                <div class="text-xs text-gray-500 truncate">
                                  G&eacute;nero: <span class="font-medium" x-text="cand.NomGenero"></span>
                                  &middot; Cat: <span class="font-medium" x-text="cand.NombreCategoria"></span>
                                </div>
                                <div x-show="cand.PPC_Descripcion" class="text-[11px] text-gray-400 italic truncate"
                                  x-text="cand.PPC_Descripcion"></div>
                                <div x-show="cand.ultimoAlbaran" class="text-[11px] text-blue-600 mt-0.5">
                                  Alb. <span class="font-medium" x-text="cand.ultimoAlbaran?.NumAlbaran"></span>
                                  &middot; <span x-text="cand.ultimoAlbaran?.FechaAlbaran ? new Date(cand.ultimoAlbaran.FechaAlbaran).toLocaleDateString() : ''"></span>
                                </div>
                              </div>
                              <span class="text-[10px] font-bold uppercase bg-blue-600 text-white px-2 py-0.5 rounded-full shrink-0">Aplicar</span>
                            </div>
                          </button>
                        </template>
                      </div>
                    </div>

                    <!-- Vacío -->
                    <div x-show="!item.buscandoHistorico && item.historico && !item.historico.error && !item.historico.pedidoActual && (!item.historico.candidatos || item.historico.candidatos.length === 0)"
                      class="text-sm text-gray-500 italic">
                      No se encontr&oacute; hist&oacute;rico para esta referencia.
                    </div>
                  </div>

                  <!-- ===== BUSCADOR ===== -->
                  <div>
                    <div class="space-y-3">
                      <div class="relative">
                        <input type="text" placeholder="Buscar por nombre o n&uacute;mero de presentaci&oacute;n..."
                          class="w-full px-4 py-2 bg-white/80 border border-gray-300 rounded-xl shadow-sm pr-8"
                          x-model="item.busquedaPresentacion"
                          @input="buscarPresentaciones(item)"
                          @focus="if(item.resultadosPresentacion.length > 0) item.mostrarResultados = true"
                          @click.away="item.mostrarResultados = false" />
                        <svg x-show="item.buscandoPresentacion"
                          class="animate-spin h-4 w-4 text-[#f17533] absolute right-3 top-3"
                          xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z" />
                        </svg>
                        <button x-show="item.presentacionSeleccionada" type="button"
                          class="absolute right-3 top-2.5 text-gray-400 hover:text-red-500 transition"
                          @click="limpiarPresentacion(item)">
                          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                          </svg>
                        </button>
                        <div x-show="item.mostrarResultados && item.resultadosPresentacion.length > 0"
                          class="absolute z-50 mt-1 w-full bg-white border border-gray-200 rounded-xl shadow-lg max-h-60 overflow-y-auto">
                          <template x-for="(pres, pi) in item.resultadosPresentacion" :key="pi">
                            <button type="button"
                              class="w-full text-left px-4 py-2.5 hover:bg-[#f17533]/10 transition-colors border-b border-gray-100 last:border-0"
                              :class="pi === 0 && pres.NumeroAlbaranes > 0 && 'bg-orange-50/80'"
                              @click="seleccionarPresentacion(item, pres)">
                              <div class="flex items-center gap-2">
                                <span class="font-semibold text-sm text-gray-800" x-text="pres.Presentacion"></span>
                                <span x-show="pi === 0 && pres.NumeroAlbaranes > 0"
                                  class="text-[10px] font-bold uppercase tracking-wide bg-[#f17533] text-white px-1.5 py-0.5 rounded-full">Recomendado</span>
                              </div>
                              <div class="text-xs text-gray-500 flex gap-3 mt-0.5">
                                <span>G&eacute;nero: <span x-text="pres.Genero" class="font-medium"></span></span>
                                <span x-show="pres.NombreCategoria">Cat: <span x-text="pres.NombreCategoria" class="font-medium"></span></span>
                                <span x-show="pres.NumeroAlbaranes > 0" class="font-medium text-[#f17533]">
                                  <span x-text="pres.NumeroAlbaranes"></span> compras
                                </span>
                              </div>
                            </button>
                          </template>
                        </div>
                        <div x-show="item.mostrarResultados && !item.buscandoPresentacion && item.resultadosPresentacion.length === 0 && item.busquedaPresentacion.length >= 1"
                          class="absolute z-50 mt-1 w-full bg-white border border-gray-200 rounded-xl shadow-lg px-4 py-3 text-sm text-gray-500">
                          Sin resultados
                        </div>
                      </div>

                      <div x-show="item.presentacionSeleccionada"
                        class="flex items-center gap-2 px-3 py-2 bg-green-50 border border-green-200 rounded-xl text-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-green-600" fill="none"
                          viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                        </svg>
                        <span class="text-green-800">
                          <span x-text="item.presentacionSeleccionada?.Presentacion" class="font-medium"></span>
                          &mdash; <span x-text="item.presentacionSeleccionada?.Genero"></span>
                        </span>
                      </div>

                      <!-- Campos resueltos -->
                      <div x-show="item.presentacionSeleccionada"
                        class="grid grid-cols-3 gap-2 text-xs text-gray-500 mt-2">
                        <div class="bg-gray-50 rounded-lg px-2 py-1.5 text-center">
                          <div class="font-medium text-gray-600">Id Presentaci&oacute;n</div>
                          <div x-text="item.id_gensal" class="text-gray-800 font-semibold"></div>
                        </div>
                        <div class="bg-gray-50 rounded-lg px-2 py-1.5 text-center">
                          <div class="font-medium text-gray-600">Categor&iacute;a</div>
                          <div x-text="item.id_categoria" class="text-gray-800 font-semibold"></div>
                        </div>
                        <div class="bg-gray-50 rounded-lg px-2 py-1.5 text-center">
                          <div class="font-medium text-gray-600">G&eacute;nero</div>
                          <div x-text="item.id_genero" class="text-gray-800 font-semibold"></div>
                        </div>
                      </div>

                    </div>

                  </div>

                  <!-- Botón Enviar -->
                  <button
                    class="mt-3 w-full py-2.5 bg-[#f17533] hover:bg-[#e75218] text-white font-semibold rounded-xl flex items-center justify-center gap-2"
                    @click="enviar(item)">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 animate-bounce" fill="none"
                      viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                    </svg>
                    Enviar
                  </button>

                  <!-- Botón de eliminar (siempre visible) -->
                  <button
                    class="mt-2 w-full py-2.5 bg-red-500 hover:bg-red-600 text-white font-semibold rounded-xl flex items-center justify-center gap-2"
                    @click="eliminar(item)">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                      stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                    Eliminar
                  </button>

                  <!-- Error debajo -->
                  <div x-show="item && item.error"
                    class="mt-4 px-4 py-2 rounded-lg bg-red-100 text-red-800 border border-red-300 text-sm font-medium flex items-center gap-2 transition-all duration-300">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-600" fill="none" viewBox="0 0 24 24"
                      stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 9v2m0 4h.01M12 2a10 10 0 1010 10A10 10 0 0012 2z" />
                    </svg>
                    <span x-text="item.error"></span>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </div>
        <!-- Modal PDF -->
        <template x-teleport="body">
          <div x-show="pdfModalOpen" x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
            x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100"
            x-transition:leave-end="opacity-0"
            class="fixed inset-0 z-[99999] flex items-center justify-center p-4 sm:p-8"
            @keydown.escape.window="cerrarPdf()">
            <!-- Overlay -->
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="cerrarPdf()"></div>
            <!-- Contenido -->
            <div x-show="pdfModalOpen" x-transition:enter="transition ease-out duration-300 delay-100"
              x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
              x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100 scale-100"
              x-transition:leave-end="opacity-0 scale-95"
              class="relative w-full max-w-5xl h-[85vh] bg-white rounded-2xl shadow-2xl overflow-hidden">
              <!-- Header del modal -->
              <div
                class="flex items-center justify-between px-5 py-3 bg-gradient-to-r from-[#00394a] to-[#00394a]/80 text-white">
                <div class="flex items-center gap-2">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                      d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
                  </svg>
                  <span class="font-semibold text-sm">Visor de documento</span>
                </div>
                <button @click="cerrarPdf()"
                  class="flex items-center justify-center w-8 h-8 rounded-full hover:bg-white/20 transition-colors duration-200">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                  </svg>
                </button>
              </div>
              <!-- iframe PDF -->
              <iframe x-bind:src="pdfBlobUrl" class="w-full h-[calc(85vh-52px)]" frameborder="0"></iframe>
            </div>
          </div>
        </template>

      </main>
    </div>
  </div>

</body>

</html>
